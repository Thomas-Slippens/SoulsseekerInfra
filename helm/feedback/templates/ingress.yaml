{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: feedback
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx

  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /feedback(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: feedback
                port:
                  number: {{ .Values.service.port }}

{{- end }}