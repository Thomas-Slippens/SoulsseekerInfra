apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback
spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: feedback

  template:
    metadata:
      labels:
        app: feedback

    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}

      containers:
        - name: feedback
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8080

          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}