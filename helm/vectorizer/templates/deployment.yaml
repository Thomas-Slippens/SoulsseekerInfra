apiVersion: apps/v1
kind: Deployment
metadata:
  name: vectorizer
spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: vectorizer

  template:
    metadata:
      labels:
        app: vectorizer

    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}

      containers:
        - name: vectorizer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8080   

          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.configMapName }}
                  key: {{ .key }}
            {{- end }}