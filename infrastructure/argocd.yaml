apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: combat-analysis
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Thomas-Slippens/SoulsseekerInfra.git
    targetRevision: HEAD
    path: helm/combat-analysis

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true