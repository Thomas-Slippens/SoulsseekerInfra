apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: soulsseeker-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: combat-analysis
            path: helm/combat-analysis
          - name: feedback
            path: helm/feedback
          - name: vectorizer
            path: helm/vectorizer

  template:
    metadata:
      name: '{{name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/Thomas-Slippens/SoulsseekerInfra.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true