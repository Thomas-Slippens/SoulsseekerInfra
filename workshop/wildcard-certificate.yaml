apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: workshop-wildcard
  namespace: default
spec:
  secretName: workshop-wildcard-tls
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "workshop-.*"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.kubernetes.soulsseeker.com"
