apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass

metadata:
  name: kv-secrets
  namespace: default

spec:
  provider: azure

  secretObjects:
    - secretName: kv-secrets
      type: Opaque

      data:
        - objectName: OpenAI--ApiKey
          key: OpenAI__ApiKey

        - objectName: Cosmos--ConnectionString
          key: Cosmos__ConnectionString

  parameters:
    keyvaultName: kv-aks-prod-argo
    tenantId: "92b1c82c-10a6-40ec-8b2e-1e63eeb29438"

    objects: |
      array:
        - |
          objectName: OpenAI--ApiKey
          objectType: secret

        - |
          objectName: Cosmos--ConnectionString
          objectType: secret