apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.14.5

    helm:
      values: |
        provider: azure-private-dns  

        domainFilters:
          - kubernetes.soulsseeker.com

        policy: sync
        registry: txt
        txtOwnerId: aks-prod

        serviceAccount:
          create: true
          name: external-dns
          annotations:
            azure.workload.identity/client-id: "3e6c1061-eb54-403c-9f8e-e8b92269e252"

        podLabels:
          azure.workload.identity/use: "true"

        azure:
          resourceGroup: accelerateThomas
          tenantId: "92b1c82c-10a6-40ec-8b2e-1e63eeb29438"
          subscriptionId: "f717c997-2aa5-4098-8b77-aae87ad42cac"
          useWorkloadIdentityExtension: true  
          useManagedIdentityExtension: false

        extraArgs:
          - --domain-filter=kubernetes.soulsseeker.com

  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true