apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.14.5

    helm:
      values: |
        provider: azure-private-dns

        domainFilters:
          - kubernetes.soulsseeker.com

        policy: sync
        registry: txt
        txtOwnerId: aks-prod

        serviceAccount:
          create: true
          name: external-dns
          annotations:
            azure.workload.identity/client-id: "0035a2e5-7506-439d-8d0b-87fb7a9de921"

        podLabels:
          azure.workload.identity/use: "true"

        azure:
          azureConfigFile: /etc/kubernetes/azure.json

        extraVolumes:
          - name: azure-config-file
            secret:
              secretName: external-dns-azure

        extraVolumeMounts:
          - name: azure-config-file
            mountPath: /etc/kubernetes
            readOnly: true

        extraArgs:
          - --domain-filter=kubernetes.soulsseeker.com

  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true