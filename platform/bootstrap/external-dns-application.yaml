apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.21.1

    helm:
      values: |
        provider: azure

        domainFilters:
          - kubernetes.soulsseeker.com

        policy: sync
        registry: txt
        txtOwnerId: aks-prod

        serviceAccount:
          create: true
          name: external-dns
          annotations:
            azure.workload.identity/client-id: "3e6c1061-eb54-403c-9f8e-e8b92269e252"

        podLabels:
          azure.workload.identity/use: "true"

        azure:
          useWorkloadIdentityExtension: true
          resourceGroup: accelerateThomas

        extraArgs:
          - --log-level=info
          - --log-format=text
          - --interval=1m
          - --source=service
          - --source=ingress
          - --policy=sync
          - --registry=txt
          - --txt-owner-id=aks-prod
          - --domain-filter=kubernetes.soulsseeker.com

  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true