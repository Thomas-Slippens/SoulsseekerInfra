apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-argocd
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Thomas-Slippens/SoulsseekerInfra.git
    targetRevision: HEAD
    path: platform/argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
