apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dapr
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://dapr.github.io/helm-charts
    chart: dapr
    targetRevision: 1.14.4
    helm:
      values: |
        global:
          ha:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: dapr-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
